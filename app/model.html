<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<title>Small Model — Residual Stream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    color: #d8d8d8;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-rows: minmax(76px, 12vh) 1fr minmax(58px, 8vh);
    background:
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      #020202;
    background-size: 32px 32px;
  }
  #context-strip,
  #current-token-strip {
    position: relative;
    overflow: hidden;
    background: rgba(0,0,0,0.92);
    text-shadow: 0 0 8px #000;
  }
  #context-strip {
    border-bottom: 1px solid rgba(255,255,255,0.14);
  }
  #context-content {
    position: absolute;
    right: 18px;
    top: 0;
    display: inline-flex;
    align-items: center;
    justify-content: flex-end;
    max-width: calc(100vw - 36px);
    height: 100%;
    overflow: visible;
    white-space: nowrap;
    color: #b8dcff;
    font-size: 18px;
    line-height: 1;
  }
  #activation-wrap {
    position: relative;
    min-height: 0;
    overflow: hidden;
  }
  #activation-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }
  #scanline {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.035),
      rgba(255,255,255,0.035) 1px,
      transparent 1px,
      transparent 6px
    );
    mix-blend-mode: screen;
    opacity: 0.36;
  }
  #readout {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 2;
    display: grid;
    gap: 4px;
    color: #9a9a9a;
    font-size: 11px;
    line-height: 1.35;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-shadow: 0 0 8px #000;
  }
  #readout .bright { color: #e6e6e6; }
  #error {
    position: absolute;
    left: 14px;
    bottom: 14px;
    z-index: 2;
    max-width: min(760px, calc(100vw - 28px));
    color: #ffb8b8;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    text-shadow: 0 0 8px #000;
  }
  #current-token-strip {
    position: relative;
    overflow: hidden;
    border-top: 1px solid rgba(255,255,255,0.16);
    background: rgba(0,0,0,0.92);
  }
  #latest-token {
    position: absolute;
    inset: 0 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    white-space: nowrap;
    color: #b8dcff;
    font-size: 20px;
    line-height: 1;
    text-shadow: 0 0 8px #000;
  }
  .token {
    color: #bdbdbd;
  }
  .token.prev2 {
    color: #ddc46c;
  }
  .token.prev1 {
    color: #ffe58a;
  }
  .token.latest {
    color: #fff15a;
    text-shadow: 0 0 12px rgba(255, 238, 90, 0.75), 0 0 8px #000;
  }
</style>
</head>
<body>
<main id="stage">
  <section id="context-strip" aria-label="Generated text context">
    <div id="context-content">Loading a small base model into this browser...</div>
  </section>
  <section id="activation-wrap" aria-label="Residual stream activation visualization">
    <canvas id="activation-canvas" width="576" height="30"></canvas>
    <div id="scanline"></div>
    <div id="readout">
      <div>Runtime <span class="bright" id="runtime">starting</span></div>
      <div>Frame <span class="bright" id="frame">0</span></div>
      <div>Token <span class="bright" id="token">loading</span></div>
      <div>Source <span class="bright" id="source">pending</span></div>
    </div>
    <div id="error"></div>
  </section>
  <section id="current-token-strip" aria-live="polite" aria-label="Most recently generated token">
    <div id="latest-token">...</div>
  </section>
</main>

<script type="module">
const BUILD_ID = 'llm-corpus-1';
const canvas = document.getElementById('activation-canvas');
const ctx = canvas.getContext('2d');
const runtime = document.getElementById('runtime');
const frame = document.getElementById('frame');
const token = document.getElementById('token');
const source = document.getElementById('source');
const error = document.getElementById('error');
const context = document.getElementById('context-content');
const latestToken = document.getElementById('latest-token');

let tokenPieces = [];

const worker = new Worker(`model-worker.js?v=${BUILD_ID}`, { type: 'module' });

// Red, white, black, and green reference Gaza/Palestine.
const ZERO_COLOR = [3, 6, 5];
const FLAG_RED_HUE = 356 / 360;
const FLAG_GREEN_HUE = 141 / 360;

function hsvToRgb(h, s, v) {
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  let r, g, b;
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    default: r = v; g = p; b = q; break;
  }
  return [r * 255, g * 255, b * 255];
}

function smoothstep(edge0, edge1, value) {
  const t = Math.max(0, Math.min(1, (value - edge0) / (edge1 - edge0)));
  return t * t * (3 - 2 * t);
}

function activationColor(value) {
  const v = Math.max(-1, Math.min(1, value || 0));
  const mag = Math.pow(Math.min(1, Math.abs(v)), 0.72);
  if (mag < 0.012) return ZERO_COLOR;

  const hue = v < 0 ? FLAG_RED_HUE : FLAG_GREEN_HUE;
  const whiteBloom = smoothstep(0.58, 0.98, mag);
  const saturation = 0.90 - whiteBloom * 0.86;
  const brightness = 0.08 + mag * 0.92;
  return hsvToRgb(hue, saturation, brightness);
}

function drawActivation(values, width, height) {
  if (canvas.width !== width || canvas.height !== height) {
    canvas.width = width;
    canvas.height = height;
  }

  const image = ctx.createImageData(width, height);
  for (let i = 0; i < width * height; i++) {
    const color = activationColor(values[i]);
    const base = i * 4;
    image.data[base] = color[0];
    image.data[base + 1] = color[1];
    image.data[base + 2] = color[2];
    image.data[base + 3] = 255;
  }
  ctx.putImageData(image, 0, 0);
}

function appendGeneratedToken(text) {
  tokenPieces.push(text);
  if (tokenPieces.length > 240) tokenPieces = tokenPieces.slice(-240);

  const priorText = tokenPieces.slice(0, -1).join('').replace(/\s+/g, ' ');
  context.textContent = priorText.slice(-900);
  latestToken.textContent = text || ' ';
}

worker.addEventListener('message', ({ data }) => {
  if (data.type === 'status') {
    runtime.textContent = data.detail || data.message;
  }
  if (data.type === 'progress') {
    runtime.textContent = `${data.message || 'loading'} ${Math.round(data.progress * 100)}%`;
  }
  if (data.type === 'ready') {
    runtime.textContent = data.detail;
  }
  if (data.type === 'output') {
    appendGeneratedToken(data.text);
    token.textContent = data.text.slice(0, 48) || ' ';
  }
  if (data.type === 'activation') {
    drawActivation(data.values, data.width, data.height);
    frame.textContent = data.frame;
    source.textContent = data.source;
    if (data.token) token.textContent = data.token.slice(0, 48);
  }
  if (data.type === 'error') {
    error.textContent = data.message;
  }
});
worker.addEventListener('error', event => {
  error.textContent = event.message || 'Model worker failed before it could report status';
});
worker.addEventListener('messageerror', () => {
  error.textContent = 'Model worker sent an unreadable message';
});

worker.postMessage({ type: 'init' });
</script>
</body>
</html>
